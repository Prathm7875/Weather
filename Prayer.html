<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family: Segoe UI;
}

.card {
  width:260px;
  background: linear-gradient(180deg,#1f4e78,#163a5c);
  color:white;
  padding:15px;
  border-radius:10px;
  position:relative;
}

.title {
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}

.prayer {
  margin:10px 0;
}

.name {
  font-size:14px;
}

.time {
  font-size:18px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

  <div class="prayer">
    <div class="name">Fajr</div>
    <div class="time" id="Fajr"></div>
  </div>

  <div class="prayer">
    <div class="name">Dhuhr</div>
    <div class="time" id="Dhuhr"></div>
  </div>

  <div class="prayer">
    <div class="name">Asr</div>
    <div class="time" id="Asr"></div>
  </div>

  <div class="prayer">
    <div class="name">Maghrib</div>
    <div class="time" id="Maghrib"></div>
  </div>

  <div class="prayer">
    <div class="name">Isha</div>
    <div class="time" id="Isha"></div>
  </div>

  <div class="title">PRAYER TIMINGS</div>

</div>

<script>
function loadPrayer(){
 fetch("https://api.aladhan.com/v1/timingsByCity?city=Doha&country=Qatar")
 .then(r=>r.json())
 .then(d=>{
   let t=d.data.timings;

   Fajr.innerText=t.Fajr;
   Dhuhr.innerText=t.Dhuhr;
   Asr.innerText=t.Asr;
   Maghrib.innerText=t.Maghrib;
   Isha.innerText=t.Isha;
 });
}

loadPrayer();
</script>

</body>
</html>
