<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family: Segoe UI;
}

/* CARD */
.card {
  width:260px;
  height:360px;
  background: linear-gradient(180deg,#2c5d87,#1f3c5b);
  color:white;
  padding:16px;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  box-sizing:border-box;
}

/* CLOSE BUTTON */
.close {
  position:absolute;
  top:10px;
  right:12px;
  font-size:14px;
  cursor:pointer;
  opacity:0.8;
}

/* PRAYER BLOCK */
.prayer {
  margin-bottom:12px;
  padding:6px 8px;
  border-radius:6px;
}

/* NAME + TIME */
.name {
  font-size:13px;
  opacity:0.7;
}

.time {
  font-size:20px;
  font-weight:600;
  margin-top:2px;
}

/* BIG EMPHASIS (like Dhuhr in your image) */
.highlight-text {
  font-size:22px;
  font-weight:700;
}

/* NEXT PRAYER HIGHLIGHT */
.next {
  background: rgba(255,255,255,0.12);
  animation: glowPulse 2s ease-in-out infinite;
}

/* ✨ Glow animation */
@keyframes glowPulse {
  0% {
    box-shadow: 0 0 0 rgba(255,255,255,0.0);
    background: rgba(255,255,255,0.10);
  }
  50% {
    box-shadow: 0 0 12px rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.18);
  }
  100% {
    box-shadow: 0 0 0 rgba(255,255,255,0.0);
    background: rgba(255,255,255,0.10);
  }
}
/* FOOTER */
.footer {
  position:absolute;
  bottom:12px;
  left:16px;
  font-size:12px;
  opacity:0.6;
  letter-spacing:1px;
}

/* MOSQUE BACKGROUND */
.mosque-bg {
  position:absolute;
  bottom:0;
  right:0;
  width:170px;
  opacity:0.08;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="close">✕</div>

  <div class="prayer" id="FajrBox">
    <div class="name">Fajr</div>
    <div class="time" id="Fajr"></div>
  </div>

  <div class="prayer" id="DhuhrBox">
    <div class="name">Dhuhr</div>
    <div class="time highlight-text" id="Dhuhr"></div>
  </div>

  <div class="prayer" id="AsrBox">
    <div class="name">Asr</div>
    <div class="time" id="Asr"></div>
  </div>

  <div class="prayer" id="MaghribBox">
    <div class="name">Maghrib</div>
    <div class="time" id="Maghrib"></div>
  </div>

  <div class="prayer" id="IshaBox">
    <div class="name">Isha</div>
    <div class="time" id="Isha"></div>
  </div>

  <div class="footer">PRAYER TIMINGS</div>

  <!-- Mosque Image -->
  <img src="https://www.svgrepo.com/show/403276/mosque.svg" class="mosque-bg">

</div>

<script>
function loadPrayer(){
 fetch("https://api.aladhan.com/v1/timingsByCity?city=Doha&country=Qatar&method=4")
 .then(r=>r.json())
 .then(d=>{
   let t=d.data.timings;

   const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

   prayers.forEach(p=>{
     document.getElementById(p).innerText = formatTime(t[p]);
     document.getElementById(p+"Box").classList.remove("next");
   });

   highlightNext(t);
 });
}

/* FORMAT TIME → 03:59 am */
function formatTime(time){
  let [h,m] = time.split(":");
  let hour = parseInt(h);
  let ampm = hour >= 12 ? "pm" : "am";

  hour = hour % 12;
  if(hour === 0) hour = 12;

  return `${hour.toString().padStart(2,'0')}:${m} ${ampm}`;
}

/* HIGHLIGHT NEXT PRAYER */
function highlightNext(t){
  const now = new Date();
  const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

  let next = null;

  for(let p of prayers){
    let [h,m] = t[p].split(":");

    let prayerTime = new Date();
    prayerTime.setHours(h, m, 0);

    if(prayerTime > now){
      next = p;
      break;
    }
  }

  if(!next) next = "Fajr";

  document.getElementById(next + "Box").classList.add("next");
}

loadPrayer();
setInterval(loadPrayer, 60000);
</script>

</body>
</html>
