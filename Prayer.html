<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prayer Timings</title>

<style>
  :root{
    --card-w: 260px;
    --card-h: 360px;

    --bg1:#2c5d87;
    --bg2:#1f3c5b;

    --text: rgba(255,255,255,.95);
    --muted: rgba(255,255,255,.68);

    --glass1: rgba(255,255,255,.08);
    --glass2: rgba(255,255,255,.14);
    --border: rgba(255,255,255,.14);

    --shadow: 0 16px 40px rgba(0,0,0,.28);
  }

  /* IMPORTANT for SharePoint iframe */
  html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;         /* avoid scrollbars */
    background: transparent; /* blends in SharePoint */
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
  }

  /* Center card inside iframe */
  .stage{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* PREMIUM CARD */
  .card{
    width:var(--card-w);
    height:var(--card-h);
    border-radius:18px;
    position:relative;
    overflow:hidden;
    color:var(--text);
    box-shadow: var(--shadow);
    box-sizing:border-box;

    background:
      radial-gradient(120px 120px at 18% 16%, rgba(255,255,255,.18), rgba(255,255,255,0) 60%),
      radial-gradient(180px 180px at 82% 18%, rgba(255,255,255,.10), rgba(255,255,255,0) 70%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
    pointer-events:none;
  }

  /* Top bar */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 14px 6px 14px;
  }
  .title{
    font-size:14px;
    letter-spacing:.6px;
    opacity:.85;
    text-transform: uppercase;
  }
  .close{
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    border-radius:10px;
    cursor:pointer;
    color:rgba(255,255,255,.85);
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    transition: all .2s ease;
    user-select:none;
  }
  .close:hover{
    background: rgba(255,255,255,.12);
    transform: translateY(-1px);
  }

  /* subtle divider line */
  .divider{
    height:1px;
    background: rgba(255,255,255,.10);
    margin: 0 14px;
  }

  /* Prayer list */
  .list{
    padding: 10px 14px 54px 14px; /* bottom padding prevents footer overlap */
  }

  .prayer{
    padding:10px 10px;
    border-radius:12px;
    margin: 10px 0;
    position:relative;
  }

  .name{
    font-size:15px;
    color: var(--muted);
    line-height:1.1;
  }

  .time{
    margin-top:2px;
    font-size:30px;
    font-weight:750;
    letter-spacing:.2px;
  }

  /* Big emphasis for Dhuhr like reference */
  #Dhuhr{
    font-size:30px;
    font-weight:800;
  }

  /* Premium next prayer highlight (glass block like your screenshot) */
  .next{
    background: linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
    border: 1px solid rgba(255,255,255,.12);
    backdrop-filter: blur(8px);
    animation: glowPulse 2s ease-in-out infinite;
  }
  .next::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:12px;
    background:
      radial-gradient(110px 60px at 20% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 65%),
      radial-gradient(120px 80px at 75% 65%, rgba(255,255,255,.10), rgba(255,255,255,0) 70%);
    pointer-events:none;
    opacity:.55;
  }

  @keyframes glowPulse{
    0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
    50%{ box-shadow:0 0 18px rgba(255,255,255,.20); }
    100%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  }

  /* Footer */
  .footer{
    position:absolute;
    left:14px;
    bottom:12px;
    font-size:12px;
    letter-spacing:1.6px;
    opacity:.65;
    text-transform: uppercase;
  }

  /* Decorative islamic pattern (top-right) */
  .pattern{
    position:absolute;
    top:-30px;
    right:-25px;
    width:190px;
    opacity:.18;
    pointer-events:none;
  }

  /* Mosque silhouette (bottom-right) */
  .mosque{
    position:absolute;
    right:-10px;
    bottom:-10px;
    width:200px;
    opacity:.10;
    pointer-events:none;
  }
</style>
</head>

<body>
  <div class="stage">
    <div class="card" id="card">

      <div class="topbar">
        <div class="title">PRAYER TIMINGS</div>
        <div class="close" id="closeBtn">✕</div>
      </div>

      <div class="divider"></div>

      <!-- Decorative pattern -->
      <svg class="pattern" viewBox="0 0 200 200" aria-hidden="true">
        <defs>
          <pattern id="p" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M20 0 L40 20 L20 40 L0 20 Z" fill="rgba(255,255,255,.55)"/>
            <path d="M20 8 L32 20 L20 32 L8 20 Z" fill="rgba(31,60,91,.9)"/>
          </pattern>
        </defs>
        <rect x="0" y="0" width="200" height="200" fill="url(#p)"/>
      </svg>

      <!-- Mosque silhouette -->
      <svg class="mosque" viewBox="0 0 260 260" aria-hidden="true">
        <g fill="rgba(255,255,255,.9)">
          <path d="M130 40c18 0 32 14 32 32 0 12-7 22-17 28v10h-30V100c-10-6-17-16-17-28 0-18 14-32 32-32z" opacity=".65"/>
          <path d="M55 235v-80c0-22 18-40 40-40h70c22 0 40 18 40 40v80H55z" opacity=".35"/>
          <path d="M110 235v-55c0-12 10-22 22-22s22 10 22 22v55h-44z" opacity=".55"/>
          <path d="M35 235h190v10H35z" opacity=".35"/>
          <path d="M30 235v-90l10-10 10 10v90H30z" opacity=".30"/>
          <path d="M210 235v-90l10-10 10 10v90h-20z" opacity=".30"/>
        </g>
      </svg>

      <!-- Prayer List -->
      <div class="list">
        <div class="prayer" id="FajrBox">
          <div class="name">Fajr</div>
          <div class="time" id="Fajr">03:43 AM</div>
        </div>

        <div class="prayer" id="DhuhrBox">
          <div class="name">Dhuhr</div>
          <div class="time" id="Dhuhr">11:33 AM</div>
        </div>

        <div class="prayer" id="AsrBox">
          <div class="name">Asr</div>
          <div class="time" id="Asr">03:02 PM</div>
        </div>

        <div class="prayer" id="MaghribBox">
          <div class="name">Maghrib</div>
          <div class="time" id="Maghrib">06:01 PM</div>
        </div>

        <div class="prayer" id="IshaBox">
          <div class="name">Isha</div>
          <div class="time" id="Isha">07:22 PM</div>
        </div>
      </div>

      <div class="footer">PRAYER TIMINGS</div>
    </div>
  </div>

<script>

  const CITY = "Doha";
  const COUNTRY = "Qatar";

  document.getElementById("closeBtn").addEventListener("click", () => {
    document.getElementById("card").style.display = "none";
