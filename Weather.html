<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI;
    background: transparent;
}

.card {
    width: 100%;
    max-width: 340px;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(180deg,#2c5d87,#1f3c5b);
    color: white;
    text-align: center;
}

/* Weather */
.city { font-size: 18px; font-weight: 600; }
.temp { font-size: 36px; margin: 5px 0; }
.weather-icon { width: 60px; }

.details {
    font-size: 13px;
    opacity: 0.9;
    margin-top: 5px;
}

/* Divider */
.divider {
    margin: 10px 0;
    height: 1px;
    background: rgba(255,255,255,0.2);
}

/* Prayer */
.prayer-title { font-size: 16px; margin-bottom: 6px; }

.prayer-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 6px;
    font-size: 13px;
}

.prayer-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 6px;
    border-radius: 6px;
}

/* Highlight next prayer */
.next {
    background: rgba(255,255,255,0.2);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

    <div class="city" id="city">Loading...</div>

    <img id="icon" class="weather-icon">

    <div class="temp" id="temp">--°C</div>

    <div id="condition">--</div>

    <div class="details">
        Wind: <span id="wind">--</span> km/h |
        Pressure: <span id="pressure">--</span> mb |
        Precip: <span id="precip">--</span> mm
    </div>

    <div class="divider"></div>

    <div class="prayer-title">Next Prayer Highlight 🔔</div>

    <div class="prayer-grid" id="prayers"></div>

</div>

<script>
const WEATHER_API = "b7f587e573bebf4d0037d30b86899760";

let currentCity = "Pune";

// 📍 Get user location
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            loadWeather(lat, lon);
            loadPrayer(lat, lon);
        }, () => {
            // fallback
            loadWeatherByCity(currentCity);
            loadPrayerByCity(currentCity);
        });
    }
}

// 🌤 Weather using coordinates
function loadWeather(lat, lon) {
    fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_API}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("city").textContent = data.name;
        document.getElementById("temp").textContent = Math.round(data.main.temp) + "°C";
        document.getElementById("condition").textContent = data.weather[0].main;
        document.getElementById("icon").src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

        document.getElementById("wind").textContent = data.wind.speed;
        document.getElementById("pressure").textContent = data.main.pressure;
        document.getElementById("precip").textContent = (data.rain && data.rain["1h"]) ? data.rain["1h"] : 0;
    });
}

// 🕌 Prayer using coordinates
function loadPrayer(lat, lon) {
    fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
    .then(res => res.json())
    .then(data => {
        renderPrayers(data.data.timings);
    });
}

// 🧠 Highlight next prayer
function renderPrayers(timings) {
    const now = new Date();

    const prayerNames = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

    let nextPrayer = null;

    for (let p of prayerNames) {
        const [h,m] = timings[p].split(":");
        const prayerTime = new Date();
        prayerTime.setHours(h, m, 0);

        if (prayerTime > now && !nextPrayer) {
            nextPrayer = p;
        }
    }

    let html = "";

    prayerNames.forEach(p => {
        const isNext = p === nextPrayer ? "next" : "";

        html += `
            <div class="prayer-item ${isNext}">
                <span>${p}</span>
                <span>${timings[p]}</span>
            </div>
        `;
    });

    document.getElementById("prayers").innerHTML = html;
}

// fallback
function loadWeatherByCity(city){
    loadWeather(18.5204,73.8567);
}
function loadPrayerByCity(city){
    loadPrayer(18.5204,73.8567);
}

// Init
getLocation();

// refresh every 10 min
setInterval(getLocation, 600000);

</script>

</body>
</html>
