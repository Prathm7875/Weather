<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI;
    background: transparent;
}

.card {
    width: 100%;
    max-width: 320px;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(180deg,#2c5d87,#1f3c5b);
    color: white;
    text-align: center;
}

/* Weather */
.city {
    font-size: 18px;
    font-weight: 600;
}

.temp {
    font-size: 36px;
    margin: 5px 0;
}

.weather-icon {
    width: 60px;
}

/* Divider */
.divider {
    margin: 10px 0;
    height: 1px;
    background: rgba(255,255,255,0.2);
}

/* Prayer */
.prayer-title {
    font-size: 16px;
    margin-bottom: 6px;
}

.prayer-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 6px;
    font-size: 13px;
}

.prayer-item {
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="card">

    <div class="city" id="city">Pune</div>

    <img id="icon" class="weather-icon">

    <div class="temp" id="temp">--°C</div>

    <div id="condition">Loading...</div>

    <div class="divider"></div>

    <div class="prayer-title">Prayer Timings</div>

    <div class="prayer-grid" id="prayers"></div>

</div>

<script>
const WEATHER_API = "b7f587e573bebf4d0037d30b86899760";
const CITY = "Pune";

// Weather
function loadWeather() {
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&appid=${WEATHER_API}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("city").textContent = data.name;
        document.getElementById("temp").textContent = Math.round(data.main.temp) + "°C";
        document.getElementById("condition").textContent = data.weather[0].main;
        document.getElementById("icon").src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
    });
}

// Prayer Timings
function loadPrayer() {
    fetch(`https://api.aladhan.com/v1/timingsByCity?city=Pune&country=India`)
    .then(res => res.json())
    .then(data => {
        const t = data.data.timings;

        const prayersHTML = `
            <div class="prayer-item"><span>Fajr</span><span>${t.Fajr}</span></div>
            <div class="prayer-item"><span>Dhuhr</span><span>${t.Dhuhr}</span></div>
            <div class="prayer-item"><span>Asr</span><span>${t.Asr}</span></div>
            <div class="prayer-item"><span>Maghrib</span><span>${t.Maghrib}</span></div>
            <div class="prayer-item"><span>Isha</span><span>${t.Isha}</span></div>
        `;

        document.getElementById("prayers").innerHTML = prayersHTML;
    });
}

loadWeather();
loadPrayer();

// Auto refresh every 10 min
setInterval(() => {
    loadWeather();
    loadPrayer();
}, 600000);

</script>

</body>
</html>
