<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family: Segoe UI;
}

.card {
  width:260px;
  background: linear-gradient(180deg,#2c5d87,#1f3c5b);
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.icon {
  width:50px;
}

.temp {
  font-size:28px;
  margin:5px 0;
}

.small {
  font-size:12px;
  opacity:0.8;
}

.forecast {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.forecast img {
  width:20px;
}
</style>
</head>

<body>

<div class="card">
  <div id="city">City</div>
  <img id="icon" class="icon">
  <div id="condition">Sunny</div>

  <div class="small">
    Wind: <span id="wind"></span> km/h<br>
    Precip: <span id="precip"></span> mm<br>
    Pressure: <span id="pressure"></span> mb
  </div>

  <div class="temp" id="temp">--°C</div>

  <div class="forecast" id="forecast"></div>
</div>

<script>
const API_KEY = "b7f587e573bebf4d0037d30b86899760";

function loadWeather(){
 fetch(`https://api.openweathermap.org/data/2.5/weather?q=Doha&units=metric&appid=${API_KEY}`)
 .then(r=>r.json())
 .then(d=>{
   city.innerText=d.name;
   temp.innerText=Math.round(d.main.temp)+"°C";
   condition.innerText=d.weather[0].main;
   icon.src=`https://openweathermap.org/img/wn/${d.weather[0].icon}.png`;

   wind.innerText=d.wind.speed;
   pressure.innerText=d.main.pressure;
   precip.innerText=(d.rain?.["1h"])||0;
 });

 fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Doha&units=metric&appid=${API_KEY}`)
 .then(r=>r.json())
 .then(d=>{
   forecast.innerHTML="";
   for(let i=0;i<5;i++){
     let item=d.list[i*8];
     forecast.innerHTML+=`
       <div>
         <img src="https://openweathermap.org/img/wn/${item.weather[0].icon}.png">
         <div class="small">${Math.round(item.main.temp)}°</div>
       </div>`;
   }
 });
}

loadWeather();
</script>

</body>
</html>
